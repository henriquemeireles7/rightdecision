name: CI
on:
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint + Format
        run: bunx biome ci .

      - name: Typecheck
        run: tsc --noEmit

      - name: Test
        run: bun test
